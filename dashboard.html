<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dashboard</title>
	<style>
		* {
			margin: 0;
			padding: 0;
		}

		body {
			display: grid;
			grid-template-columns: 1fr 1fr 1fr;
		}

		.container {
			padding: 20px;
			float: left;
			background-color: #ddd;
			max-width: 640px;
		}

		#title {
			width: 600px;
			padding: 10px;
			outline: none;
		}

		#text {
			width: 600px;
			padding: 11px;
			height: 500px;
			outline: none;
		}

		#btn-save {
			padding: 10px 20px;
			float: left;
		}

		.left {}

		.right {
			padding: 10px;
			display: inline-block;
		}

		#blog {
			display: grid;
			grid-template-columns: 1fr;
			margin: 20px;
		}

		.card {
			width: 300px;
			border: 1px solid white;
			border-radius: 10px;
			padding: 10px;
		}

		.featured img {
			width: 100%;
		}

		.edit {
			display: block;
			padding: 6px 16px;
		}
	</style>
</head>

<body>

	<div class="left">
		<div id="blog"></div>
	</div>

	<div class="middle">
		<div class="container">
			<input type="text" name="title" id="title" placeholder="Title">
		</div>
		<div class="container">
			<textarea name="text" id="text"></textarea>
		</div>
	</div>


	<div class="right">
		<button onclick="" id="btn-save">Save</button>
	</div>

	<script src="https://www.gstatic.com/firebasejs/8.1.1/firebase-app.js"></script>
	<script src="https://www.gstatic.com/firebasejs/8.1.1/firebase-firestore.js"></script>
	<script src="https://www.gstatic.com/firebasejs/8.1.1/firebase-analytics.js"></script>
	<script type="module" src="blog/Post.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Simple Router</title>

    <style>
        body {
            background-color: rgb(26, 25, 25);
            color: #eee
        }
    </style>

    <script>
        window.onload = function () {

            const view = document.getElementById('view');

            const activeRoutes = document.querySelectorAll('[route]');

            function navigate(event) {
                const route = event.target.attributes[0].value;

                const routeInfo = blogRouter.routes.filter(r => {
                    return r.path === route;
                })[0];

                if (!routeInfo) {
                    window.history.pushState({}, '', 'error')
                    view.innerHTML = 'No route exists with this path'
                } else {
                    window.history.pushState({}, '', routeInfo.path);
                    view.innerHTML = 'You have clicked the ' + routeInfo.name + ' route'
                }
            };

            // add event listeners

            activeRoutes.forEach(route => {
                route.addEventListener('click', navigate, false);
            });

            const Router = function (name, routes) {
                return {
                    name: name,
                    routes: routes
                }
            };

            const blogRouter = new Router('blogRouter', [
                {
                    path: '/blog/new.html',
                    name: 'Root'
                },
                {
                    path: '/blog/about',
                    name: 'About'
                },
                {
                    path: '/contact',
                    name: 'Contact'
                }
            ]);

            const currentPath = window.location.pathname;

            if (currentPath === '/blog/new.html') {
                view.innerHTML = 'You are on the root page';
            } else {
                const route = blogRouter.routes.filter(r => {
                    return r.path === currentPath
                })[0];

                if (route) {
                    view.innerHTML = 'You are on the ' + route.name + ' path'
                } else {
                    view.innerHTML = '404!';
                }
            }
        }
    </script>
</head>

<body>
    <h3>Simple router</h3>
    <div id="view"></div>
    <button route="/blog/new.html">Root</button>
    <button route="/blog/about">About</button>
    <button route="/contact">Contact</button>
    <button route="/404">404</button>
</body>

</html>
